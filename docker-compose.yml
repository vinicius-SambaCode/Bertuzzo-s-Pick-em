services:
  db:
    image: postgres:16-alpine
    container_name: bolao_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bolao_user
      POSTGRES_PASSWORD: bolao_pass_2026
      POSTGRES_DB: bolao_copa
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao_user -d bolao_copa"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bolao_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - uploads_data:/app/public/uploads
    environment:
      DATABASE_URL: postgresql://bolao_user:bolao_pass_2026@db:5432/bolao_copa
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-copa-bertuzzo-super-secret-change-me-in-prod}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/app/entrypoint.sh"]
    command: ["npm", "run", "dev"]

volumes:
  postgres_data:
  uploads_data:
